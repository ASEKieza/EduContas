<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 140" fill="none">
  <!-- White fill inside oval -->
  <ellipse cx="115" cy="70" rx="108" ry="62" fill="white"/>

  <!-- Outer oval border – dark gray -->
  <ellipse cx="115" cy="70" rx="108" ry="62" fill="none" stroke="#555" stroke-width="7"/>

  <!-- Yellow arc on right side (thick C-curve) -->
  <path d="M204 18 Q238 70 204 122" stroke="#E8C000" stroke-width="13" fill="none" stroke-linecap="round"/>

  <!-- Left angular notch lines (decorative cut) -->
  <line x1="22" y1="32" x2="8"  y2="70"  stroke="#555" stroke-width="6" stroke-linecap="round"/>
  <line x1="8"  y1="70" x2="22" y2="108" stroke="#555" stroke-width="6" stroke-linecap="round"/>

  <!-- ASE main text -->
  <text x="113" y="82"
        text-anchor="middle"
        font-family="'Arial Black', 'Franklin Gothic Heavy', Arial, sans-serif"
        font-weight="900"
        font-size="52"
        fill="#4a4a4a"
        letter-spacing="3">ASE</text>

  <!-- ANTÓNIO SAMUEL EDUARDO -->
  <text x="113" y="98"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-weight="700"
        font-size="10"
        fill="#4a4a4a"
        letter-spacing="1.2">ANTÓNIO SAMUEL EDUARDO</text>
</svg>
